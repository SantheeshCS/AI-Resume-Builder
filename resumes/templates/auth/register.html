{% extends 'base.html' %}

{% block content %}
<div class="auth-container glass">
    <h2>Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <div class="field">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="error">{{ field.errors|striptags }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <button class="btn-primary" type="submit">Register</button>
        <p class="muted">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </form>
</div>
{% endblock %}
